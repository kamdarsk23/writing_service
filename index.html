<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Writing Service</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- Must run before Supabase loads: recovery links sometimes become
         #/auth/update-password%23access_token=... which GoTrue cannot parse. -->
    <script>
      (function () {
        var h = window.location.hash;
        if (
          h.indexOf('access_token=') !== -1 &&
          h.indexOf('type=recovery') !== -1 &&
          !h.startsWith('#access_token')
        ) {
          var i = h.indexOf('access_token=');
          if (i !== -1) {
            window.history.replaceState(
              null,
              '',
              window.location.pathname + window.location.search + '#' + h.slice(i)
            );
          }
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
