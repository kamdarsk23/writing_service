# Local / CLI config. Link: supabase link --project-ref <ref>
# Docs: https://supabase.com/docs/guides/local-development/cli/config

project_id = "writing_service"

# Gateway JWT check must be OFF or the API returns 401 {"message":"Invalid JWT"} before
# this code runs (expired/margin tokens, hash-router timing). The function still checks the
# user via auth.getUser().
#
# Deploy from this folder (or pass --workdir):
#   supabase functions deploy append-writing-log --no-verify-jwt
[functions.append-writing-log]
verify_jwt = false
